{{ define "main" }}
<div class="wrap">
  <header class="page-head">
    <h1 class="page-title page-title--term">#{{ lower .Title }}</h1>
    <p class="page-sub">{{ i18n "postCount" (len .Pages) }} {{ i18n "taggedWith" (lower .Title) }} · <a href="{{ (site.GetPage "/tags").RelPermalink }}">{{ i18n "allTags" }}</a></p>
  </header>
  {{- $pag := .Paginate .Pages }}
  <div class="post-list">
    {{- range $pag.Pages }}
      {{ partial "post-row.html" . }}
    {{- end }}
  </div>
  {{ partial "pagination.html" . }}
</div>
{{ end }}
