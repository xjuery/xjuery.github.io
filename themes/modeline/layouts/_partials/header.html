<header class="site-header">
  <div class="wrap site-header-inner">
    <a class="logo" href="{{ site.Home.RelPermalink }}">{{ site.Params.logoText | default site.Title }}<span class="logo-accent">{{ site.Params.logoAccent }}</span></a>
    <nav class="site-nav" aria-label="Main navigation">
      {{ range site.Menus.main }}
        {{- $active := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) -}}
        <a href="{{ .URL }}"{{ if $active }} class="is-active" aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
    <div class="site-tools">
      {{- if site.Params.search | default true }}
      <div class="search" id="search">
        <input id="search-input" type="search" placeholder="Search" aria-label="Search posts"
               autocomplete="off" spellcheck="false" data-index="{{ "index.json" | relURL }}">
        <kbd class="search-kbd" aria-hidden="true">/</kbd>
        <ul id="search-results" class="search-results" hidden></ul>
      </div>
      {{- end }}
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark / light theme">
        <span class="theme-icon theme-icon--moon" aria-hidden="true">🌙</span>
        <span class="theme-icon theme-icon--sun" aria-hidden="true">☀️</span>
      </button>
    </div>
  </div>
</header>
