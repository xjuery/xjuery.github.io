<footer class="site-footer">
  <div class="wrap site-footer-inner">
    <span>© {{ now.Year }} {{ site.Params.copyright | default site.Title }}</span>
    <span>{{ site.Params.footerNote | default "built with Hugo · :wq" }}{{ with site.Home.OutputFormats.Get "rss" }} · <a href="{{ .RelPermalink }}">RSS</a>{{ end }}</span>
  </div>
</footer>
