baseURL = 'https://juery.fr/'
title = 'juery.fr'
theme = 'modeline'
enableRobotsTXT = true
enableEmoji = true
capitalizeListTitles = false

# i18n: English lives at the site root, French under /fr/.
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false

[pagination]
  pagerSize = 8

[taxonomies]
  tag = 'tags'

# Posts are stored in monthly folders (content/posts/YYYY-MM/) but keep flat
# URLs (/posts/<slug>/) so the organization on disk never breaks a link.
[permalinks]
  [permalinks.page]
    posts = '/posts/:contentbasename/'

[outputs]
  home = ['html', 'rss', 'json']

# RSS feeds (layouts/rss.xml): /index.xml and /fr/index.xml carry the latest
# posts with full content; /posts/index.xml and per-tag feeds come for free.
[services.rss]
  limit = 20

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  # Let a standalone image take an attribute list on the next line,
  # e.g. {width="400"} — consumed by _markup/render-image.html.
  [markup.goldmark.parser]
    wrapStandAloneImageWithinParagraph = false
    [markup.goldmark.parser.attribute]
      block = true
  [markup.highlight]
    noClasses = false
    lineNos = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

# Shared params (language-specific ones live under [languages.*.params]).
[params]
  copyright = 'juery.fr'
  footerNote = 'built with Hugo'

  # Header logo, rendered as {logoText}{logoAccent} with the accent colored.
  logoText = 'juery'
  logoAccent = '.fr'

  # Features
  search = true            # client-side search + "/" shortcut
  loadGoogleFonts = true   # set false to use system fonts (or self-host)

  # Optional: pin tags to a pill color (blue, green, yellow, purple, red).
  # Unlisted tags get a stable color derived from their name.
  [params.tagColors]
    tools = 'blue'
    go = 'brown'
    ops = 'yellow'
    rust = 'purple'
    rant = 'red'
    architecture = 'green'
    vim = 'red'
    git = 'purple'
    
[languages]
  [languages.en]
    label = 'English'
    locale = 'en'
    weight = 1
    [languages.en.params]
      description = "Everything I wish I'd known about building software, sooner."
      heroEyebrow = 'Software architect · writing weekly'
      heroTitle = 'Software architecture, patterns, and tools — decoded.'
      heroText = "Everything I wish I'd known about building software, sooner. Notes from the rabbit holes of new technologies."
    [languages.en.menus]
      [[languages.en.menus.main]]
        name = 'Posts'
        pageRef = '/posts'
        weight = 10
      [[languages.en.menus.main]]
        name = 'Tags'
        pageRef = '/tags'
        weight = 20
      [[languages.en.menus.main]]
        name = 'About'
        pageRef = '/about'
        weight = 30

  [languages.fr]
    label = 'Français'
    locale = 'fr'
    weight = 2
    [languages.fr.params]
      description = "Tout ce que j'aurais aimé savoir plus tôt sur la création de logiciels."
      heroEyebrow = 'Architecte logiciel · un billet par semaine'
      heroTitle = 'Architecture logicielle, patterns et outils — décodés.'
      heroText = "Tout ce que j'aurais aimé savoir plus tôt sur la création de logiciels. Notes tirées de mes plongées dans les nouvelles technologies."
    [languages.fr.menus]
      [[languages.fr.menus.main]]
        name = 'Articles'
        pageRef = '/posts'
        weight = 10
      [[languages.fr.menus.main]]
        name = 'Tags'
        pageRef = '/tags'
        weight = 20
      [[languages.fr.menus.main]]
        name = 'À propos'
        pageRef = '/about'
        weight = 30
