baseURL = 'https://juery.fr/'
locale = 'en'
title = 'juery.fr'
theme = 'modeline'
enableRobotsTXT = true
enableEmoji = true
capitalizeListTitles = false

[pagination]
  pagerSize = 8

[taxonomies]
  tag = 'tags'

[outputs]
  home = ['html', 'rss', 'json']

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    lineNos = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[menus]
  [[menus.main]]
    name = 'Posts'
    pageRef = '/posts'
    weight = 10
  [[menus.main]]
    name = 'Tags'
    pageRef = '/tags'
    weight = 20
  [[menus.main]]
    name = 'About'
    pageRef = '/about'
    weight = 30

[params]
  description = 'Everything I wish I'd known about building software, sooner.'
  copyright = 'juery.fr'
  footerNote = 'built with Hugo'

  # Header logo, rendered as {logoText}{logoAccent} with the accent colored.
  logoText = 'juery'
  logoAccent = '.fr'

  # Home hero
  heroEyebrow = 'Software architect · writing weekly'
  heroTitle = 'Software architecture, patterns, and tools — decoded.'
  heroText = 'Everything I wish I'd known about building software, sooner. Notes from the rabbit holes of new technologies.'

  # Features
  search = true            # client-side search + "/" shortcut
  loadGoogleFonts = true   # set false to use system fonts (or self-host)

  # Optional: pin tags to a pill color (blue, green, yellow, purple, red).
  # Unlisted tags get a stable color derived from their name.
  [params.tagColors]
    vim = 'blue'
    go = 'green'
    ops = 'yellow'
    rust = 'purple'
    rant = 'red'
