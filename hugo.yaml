# Basic site configuration
baseURL: 'https://www.juery.fr'    # Website's base URL
title: 'juery.fr'               # Website title
theme: 'hugo-narrow'              # Theme name

# Language settings
# Basic language settings
languageCode: fr-FR
defaultContentLanguage: fr
defaultContentLanguageInSubdir: false

# Language configuration - language switch button reads supported languages from here
languages:
  en:
    languageCode: en-US
    languageName: "English"
    weight: 2
  fr:
    languageCode: fr-FR
    languageName: "Français"
    weight: 1

# Timezone setting
timeZone: 'UTC'                  # Timezone setting

# Content processing configuration
#hasCJKLanguage: false  # Whether content includes CJK (Chinese, Japanese, Korean) characters
enableEmoji: true      # Enable emoji support

# Pagination configuration
pagination:
  pagerSize: 6       # Number of pages shown in paginator

# URL configuration
permalinks:
  posts: /posts/:year/:month/:slug/  # Post permalink format
  pages: /:slug/                     # Page permalink format

# Taxonomy configuration (no need to modify)
taxonomies:
  category: categories  # Categories
  tag: tags           # Tags

params:
  logo:
    image: /images/juery.fr.png
  # Language switcher settings
  showLanguageSwitch: true    # Show language switcher

  showThemeSwitch: true 
  colorScheme: "default"
  
  # Theme list
  themes:
    default:
      name: "Default"
      order: 1
    claude:
      name: "Claude"
      order: 2
    nord:
      name: "Nord"
      order: 3
    sunset:
      name: "Sunset"
      order: 4
    abyss:
      name: "Abyss"
      order: 5
    dracula:
      name: "Dracula"
      order: 6

  post:
    showRelated: true           # Related
    relatedPostsCount: 3        # Related posts numbers

    license:
      show: true
      author: Xavier JUERY
      name: "CC BY-NC-SA 4.0"
      description: "This work is licensed under a Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International License. Please attribute the source, use non-commercially, and maintain the same license."
      url: "https://creativecommons.org/licenses/by-nc-sa/4.0/"
      displayName: "CC BY-NC-SA 4.0"

menus:
  main:
    - name: nav.posts      # Display name
      pageRef: /posts      # Page reference
      weight: 20          # Sort weight
      params:
        icon: posts       # Icon name

    - name: nav.categories
      pageRef: /categories
      weight: 30
      params:
        icon: categories

    - name: nav.tags
      pageRef: /tags
      weight: 40
      params:
        icon: tags

    - name: nav.archives
      pageRef: /archives
      weight: 50
      params:
        icon: archive